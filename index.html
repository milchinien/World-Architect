<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worldsim</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.4);
      padding: 6px 10px;
      border-radius: 6px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="info">Worldsim – Linke Maustaste: drehen | Rechte Maustaste: verschieben | Scrollen: zoomen</div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
